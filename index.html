<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWLEST |</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f13;
            --bg-card: rgba(28, 28, 36, 0.6); /* Glass effect base */
            --primary: #9d4edd;
            --primary-glow: rgba(157, 78, 221, 0.5);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* --- Blurry Cosmic Background --- */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1506318244203-197f24102477?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            filter: blur(15px);
            opacity: 0.15; 
            z-index: -1;
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 5px;
            font-weight: 600;
        }

        /* --- Bot Selection Area --- */
        .bot-selector {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem;
            flex-wrap: wrap;
        }

        .bot-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .bot-profile:active, .bot-profile.active {
            transform: scale(0.95);
        }

        .bot-logo-frame {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #111;
            border: 2px solid transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .bot-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .bot-profile.active .bot-logo-frame {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .bot-name {
            margin-top: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .bot-profile.active .bot-name {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* --- Showcase Display Area (Glassmorphism) --- */
        .commands-container {
            flex: 1;
            padding: 1rem 1.5rem 2rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .commands-header {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .commands-header h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .commands-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Tags */
        .tags-container {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .tech-tag {
            background: rgba(157, 78, 221, 0.15);
            color: #d8b4fe;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        /* Features List */
        .features-box {
            margin-top: 20px;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid var(--primary);
        }

        .features-box h4 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .features-list {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.7;
            padding-left: 20px;
        }

        .features-list li {
            margin-bottom: 8px;
        }

        .open-bot-btn {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, #9d4edd, #7b2cbf);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
            transition: transform 0.2s;
        }

        .open-bot-btn:active {
            transform: scale(0.98);
        }

        .placeholder-text {
            text-align: center;
            color: var(--text-muted);
            margin-top: 4rem;
            font-size: 1rem;
            font-weight: 600;
        }

        /* --- Footer --- */
        footer {
            background: rgba(15, 15, 19, 0.8);
            backdrop-filter: blur(5px);
            padding: 2rem 1rem;
            text-align: center;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            font-style: italic;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-btn {
            background-color: transparent;
            color: var(--primary);
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(157, 78, 221, 0.4);
            transition: all 0.2s ease;
        }

        .footer-btn:active {
            background-color: rgba(157, 78, 221, 0.15);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <header>
        <h1>OWLEST</h1>
        <p class="subtitle">| Telegram Bots |</p>
    </header>

    <div class="bot-selector">
        <div class="bot-profile" onclick="showBot('zoya', this)">
            <div class="bot-logo-frame">
                <img src="https://files.catbox.moe/ca5km1.jpg" class="bot-img" alt="Zoya">
            </div>
            <span class="bot-name">Zoya AI</span>
        </div>

        <div class="bot-profile" onclick="showBot('ghost', this)">
            <div class="bot-logo-frame">
                <img src="https://files.catbox.moe/5ynyru.jpg" class="bot-img" alt="Ghost Zelt">
            </div>
            <span class="bot-name">Shadow Stick</span>
        </div>

        <div class="bot-profile" onclick="showBot('numinfo', this)">
            <div class="bot-logo-frame">
                <img src="https://files.catbox.moe/dd19ju.jpg" class="bot-img" alt="NUM INFO">
            </div>
            <span class="bot-name">NUM INFO</span>
        </div>
    </div>

    <div class="commands-container">
        <div id="placeholderText" class="placeholder-text">
            <span style="font-size: 2.5rem; display: block; margin-bottom: 10px;">✨</span>
            Select a bot to explore its universe.
        </div>

        <div id="botHeader" class="commands-header">
            <h2 id="botTitle">Bot Name</h2>
            <p id="botDesc">Bot Description</p>
            
            <div id="botTags" class="tags-container"></div>

            <div class="features-box">
                <h4>🌟 Key Capabilities</h4>
                <ul id="featuresList" class="features-list"></ul>
            </div>

            <a id="botLink" href="#" target="_blank" class="open-bot-btn">Launch Bot 🚀</a>
        </div>
    </div>

    <footer>
        <p>"Automating the chat, one script at a time."</p>
        <div class="footer-links">
            <a href="https://t.me/THINKOF5" target="_blank" class="footer-btn">📢 Updates Channel</a>
            <a href="https://t.me/redvinus" target="_blank" class="footer-btn">💬 Support Group</a>
        </div>
    </footer>

    <script>
        // Data directly from your provided screenshots
        const botData = {
            zoya: {
                title: "Zoya AI 🎀",
                link: "https://t.me/aizoyaabot", 
                desc: "Your Ultimate Group Assistant & Game Bot! Zoya brings an entire virtual economy and gaming experience straight to your chat.",
                tags: ["Chat to Earn", "Economy", "Roleplay", "AI"],
                features: [
                    "<strong>Chat to Earn:</strong> Get paid ₹10-₹25 just for being active and sending messages/media.",
                    "<strong>Economy & Games:</strong> Rob users, bet cash, challenge the group to RPS, and buy shields.",
                    "<strong>Roleplay Drama:</strong> Use /slap, /hug, /kiss, and more to virtually interact with friends.",
                    "<strong>Natural AI:</strong> Chat with Zoya naturally—just say her name or reply to her!"
                ]
            },

            ghost: {
                title: "Zletbot Premium 🦇",
                link: "https://t.me/zletbot", 
                desc: "The most advanced Sticker & Secret Messaging toolkit for Telegram. Manage your own sticker empire and send hidden messages with style.",
                tags: ["Sticker Tools", "Smart Whispers", "Memes", "Utility"],
                features: [
                    "<strong>Premium Sticker Kit:</strong> Use <code>/kang</code> to steal Static, Video, or Animated stickers into your custom packs instantly.",
                    "<strong>Quotly & Memes:</strong> Create professional quote stickers with custom colors via <code>/q</code> and high-quality memes with <code>/mmf</code>.",
                    "<strong>Smart Whispers:</strong> Send secret messages using <code>@bot @user</code> with target mention notifications so they never miss your whisper.",
                    "<strong>Pack Manager:</strong> Interactive UI to view and delete your sticker volumes (Static/Video/Animated) directly with buttons."
                ]
            },
            
            numinfo: {
                title: "NUM INFO 🕵️‍♂️",
                link: "https://t.me/Dead_Life_x_bot", 
                desc: "Welcome to the Dark Side of OSINT. Data. Power. Control. Built for serious users looking for fast, clean, and accurate intelligence.",
                tags: ["OSINT", "Data Lookup", "Dark UI", "No Fake Data"],
                features: [
                    "<strong>Deep Lookups:</strong> Indian & Pakistan Number lookup, IP, IFSC, and IMEI.",
                    "<strong>Gov & Auto Intelligence:</strong> PAN, GST, PAN→GST, and full Vehicle RC details.",
                    "<strong>Social Scan:</strong> Deep Instagram profile scanning.",
                    "<strong>Credits System:</strong> Free credits for new users + unlimited access paid plans.",
                    "Clean formatted data with zero junk JSON spam."
                ]
            }
        };

        function showBot(botId, element) {
            document.querySelectorAll('.bot-profile').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('placeholderText').style.display = 'none';
            document.getElementById('botHeader').style.display = 'block';

            const data = botData[botId];
            document.getElementById('botTitle').innerHTML = data.title;
            document.getElementById('botDesc').innerText = data.desc;
            document.getElementById('botLink').href = data.link; 

            const tagsContainer = document.getElementById('botTags');
            tagsContainer.innerHTML = '';
            data.tags.forEach(tag => {
                tagsContainer.innerHTML += `<span class="tech-tag">${tag}</span>`;
            });

            const featuresList = document.getElementById('featuresList');
            featuresList.innerHTML = '';
            data.features.forEach(feature => {
                featuresList.innerHTML += `<li>${feature}</li>`;
            });
        }
    </script>
</body>
</html>
